<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GLOCAL · chat elegante</title>
    
    <!-- Fuente moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    
    <!-- Nuestros CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

    <div class="app">
        <!-- Sidebar elegante -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>GLOCAL</h2>
                <p class="subtitle">chat global</p>
            </div>
            
            <div class="status-container">
                <span class="status-led" id="statusLed"></span>
                <span class="status-text" id="statusText">Conectando...</span>
            </div>
            
            <div class="online-badge" id="onlineCount">
                0 conectados
            </div>
            
            <div class="nick-section">
                <label class="section-label">Tu nombre</label>
                <div class="nick-input-group">
                    <input type="text" class="input" id="nicknameInput" placeholder="Escribe tu nick" maxlength="20">
                    <button class="btn btn-primary" id="changeNickBtn">✓</button>
                </div>
            </div>
            
            <div class="users-section">
                <label class="section-label">Conectados</label>
                <div class="users-list" id="userList"></div>
            </div>
            
            <div class="sidebar-footer">
                <span>v2.0 · diseño elegante</span>
            </div>
        </aside>
        
        <!-- Chat principal -->
        <main class="chat-main">
            <div class="messages-container" id="messages"></div>
            
            <div class="input-area">
                <input type="text" class="input message-input" id="messageInput" placeholder="Escribe un mensaje..." autofocus>
                <button class="btn btn-primary send-button" id="sendBtn">Enviar</button>
            </div>
        </main>
    </div>

    <!-- Scripts (ordenados: utils, ui, app) -->
    <script type="module" src="js/utils/helpers.js"></script>
    <script type="module" src="js/ui/sidebar.js"></script>
    <script type="module" src="js/ui/messages.js"></script>
    <script type="module" src="js/ui/users.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
