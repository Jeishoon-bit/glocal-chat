<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GLOCAL · chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- MODAL DE BIENVENIDA GLOCAL CHAT -->
    <div id="glocalWelcome" class="welcome-overlay">
        <div class="welcome-card">
            <div class="welcome-icon">🌍</div>
            <h1>BIENVENIDO A</h1>
            <h2>GLOCAL CHAT</h2>
            
            <div class="welcome-divider"></div>
            
            <p class="welcome-text">
                El chat global con estilo<br>
                Conecta con personas de todo el mundo
            </p>
            
            <div class="welcome-features">
                <span>💬 Habla en cualquier idioma</span>
                <span>🎨 Diseño tipo iPhone</span>
                <span>✨ Minimalista y elegante</span>
            </div>
            
            <div class="welcome-creator">
                Creado por <strong>Jeishoon</strong>
            </div>
            
            <button class="welcome-button" id="enterGlocalBtn">ENTRAR</button>
        </div>
    </div>

    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>GLOCAL</h2>
                <p class="subtitle">chat global</p>
            </div>
            
            <div class="status-container">
                <span class="status-led" id="statusLed"></span>
                <span class="status-text" id="statusText">Conectando...</span>
            </div>
            
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="usernameDisplay">Cargando...</div>
                    <div class="user-badge" id="userBadge"></div>
                </div>
            </div>
            
            <div class="online-badge" id="onlineCount">0 conectados</div>
            
            <div class="nick-section">
                <label class="section-label">Cambiar nick</label>
                <div class="nick-input-group">
                    <input type="text" class="input" id="nicknameInput" placeholder="nuevo nick" maxlength="20">
                    <button class="btn" id="changeNickBtn">✓</button>
                </div>
            </div>
            
            <div class="users-section">
                <label class="section-label">Conectados</label>
                <div class="users-list" id="userList"></div>
            </div>
            
            <button class="logout-btn" id="logoutBtn">🚪 Cerrar sesión</button>
        </aside>
        
        <main class="chat-main">
            <div class="messages-container" id="messages"></div>
            
            <div class="input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Escribe un mensaje..." autofocus>
                <button class="send-button" id="sendBtn">Enviar</button>
            </div>
        </main>
    </div>

    <script>
        // Verificar autenticación
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }
    </script>
    
    <script type="module" src="js/utils/helpers.js"></script>
    <script type="module" src="js/ui/sidebar.js"></script>
    <script type="module" src="js/ui/messages.js"></script>
    <script type="module" src="js/ui/users.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
